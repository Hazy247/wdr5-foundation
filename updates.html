<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="WDR5 Foundation research, community and event updates.">
  <title>Updates | WDR5 Foundation</title>
  <link rel="icon" href="assets/images/favicon.png">
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="assets/js/site.js" defer></script>
  <script src="assets/js/updates.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div data-site-header></div>
  <main id="main">
    <section class="inner-hero">
      <div class="shell"><div class="inner-hero-copy"><span class="eyebrow">News and progress</span><h1>Latest updates</h1><p>Research developments, community stories, events and practical foundation news.</p></div></div>
    </section>

    <section class="section">
      <div class="shell">
        <div class="search-field"><label class="skip-link" for="update-search">Search updates</label><input id="update-search" data-update-search type="search" placeholder="Search updates…"></div>
        <div class="filters" aria-label="Filter updates">
          <button class="filter-button is-active" type="button" data-update-filter="All">All updates</button>
          <button class="filter-button" type="button" data-update-filter="Research">Research</button>
          <button class="filter-button" type="button" data-update-filter="Community">Community</button>
          <button class="filter-button" type="button" data-update-filter="Events">Events</button>
          <button class="filter-button" type="button" data-update-filter="Foundation">Foundation</button>
        </div>
        <div class="updates-grid" data-updates-grid><p>Loading updates…</p></div>
      </div>
    </section>

    <section class="section section-soft">
      <div class="shell cta-band">
        <div class="cta-band-content">
          <span class="eyebrow" style="color:#9deaf5">Never miss an update</span>
          <h2>Stay connected to the work.</h2>
          <p>Register for foundation news, research opportunities and community events.</p>
          <a class="button button-coral" href="register.html#newsletter">Join the newsletter</a>
        </div>
      </div>
    </section>
  </main>
  <div data-site-footer></div>
</body>
</html>
